<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Thank you — Request received</title>
    <style>
        :root{--bg:#f6fbff;--card:#ffffff;--accent:#0b6efd;--muted:#666}
        html,body{height:100%}
        body{
            margin:0;
            font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;
            background:linear-gradient(180deg,var(--bg),#eef6ff);
            display:flex;
            align-items:center;
            justify-content:center;
            padding:24px;
            color:#111;
        }
        .card{
            background:var(--card);
            max-width:720px;
            width:100%;
            padding:36px;
            border-radius:12px;
            box-shadow:0 8px 30px rgba(15,30,60,0.08);
            text-align:center;
        }
        .icon{
            width:72px;
            height:72px;
            display:inline-grid;
            place-items:center;
            margin-bottom:16px;
            border-radius:50%;
            background:linear-gradient(180deg,rgba(11,110,253,0.12),rgba(11,110,253,0.06));
            color:var(--accent);
        }
        h1{margin:0 0 8px;font-size:1.6rem}
        p{margin:0 0 20px;color:var(--muted)}
        .actions{
            display:flex;
            gap:12px;
            justify-content:center;
            flex-wrap:wrap;
        }
        .btn{
            appearance:none;
            border:0;
            padding:10px 18px;
            font-size:1rem;
            border-radius:8px;
            cursor:pointer;
            text-decoration:none;
            display:inline-flex;
            align-items:center;
            gap:10px;
        }
        .btn-primary{
            background:var(--accent);
            color:#fff;
            box-shadow:0 6px 18px rgba(11,110,253,0.18);
        }
        .btn-secondary{
            background:transparent;
            color:var(--accent);
            border:1px solid rgba(11,110,253,0.12);
        }
        .note{font-size:.9rem;color:#4b5563;margin-top:14px}
    </style>
</head>
<body>
    <main class="card" role="main" aria-labelledby="thank-heading">
        <div class="icon" aria-hidden="true">
            <!-- simple check SVG -->
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M20 6L9 17l-5-5"/>
            </svg>
        </div>

        <h1 id="thank-heading">Thank you — we received your message</h1>
        <p>Thanks for getting in touch. We’ve received your request and will respond as soon as possible.</p>

        <div class="actions">
            <!-- JS-enabled button -->
            <button class="btn btn-primary" onclick="location.href='index.html'">Return to Home</button>

            <!-- Plain link fallback for non-JS environments -->
            <a class="btn btn-secondary" href="index.html">Go to index.html</a>
        </div>

        <p class="note">If you need immediate assistance, call us or reply to the confirmation email.</p>
    </main>
</body>
</html>
